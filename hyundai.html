<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPM — 현대홈쇼핑 베스트랭킹</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
      --border: #242830; --border2: #2e3340;
      --accent: #22d3a0; --accent2: #0ea472;
      --green: #22d3a0; --red: #f7566a; --yellow: #f5c842;
      --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6a;
      --mono: 'DM Mono', monospace; --sans: 'Pretendard', sans-serif; --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(34,211,160,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34,211,160,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px;
      background: rgba(10,12,16,.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 13px; color: var(--text2); }
    .logo-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
    }
    .logo strong { color: var(--text); font-weight: 500; }
    .nav-tabs { display: flex; gap: 2px; }
    .nav-tab {
      padding: 6px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      text-decoration: none; color: var(--text3); border: 1px solid transparent; transition: all .15s;
    }
    .nav-tab:hover { color: var(--text2); }
    .nav-tab.active-gs { background: rgba(249,115,22,.15); color: #f97316; border-color: rgba(249,115,22,.3); font-weight: 600; }
    .nav-tab.active-cj-off { background: rgba(34,211,160,.15); color: #22d3a0; border-color: rgba(34,211,160,.3); font-weight: 600; }
    .nav-tab.active-hyundai { background: rgba(34,211,160,.15); color: #22d3a0; border-color: rgba(34,211,160,.3); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 16px; border-radius: 8px;
      font-family: var(--sans); font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border2);
      background: var(--surface); color: var(--text2); transition: all .15s;
    }
    .btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-accent:hover { opacity: .85; }

    /* ── LAYOUT ── */
    .layout { position: relative; z-index: 1; display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 56px); }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border); padding: 20px 0;
      position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto;
    }
    .sidebar-label { padding: 6px 20px 4px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); font-family: var(--mono); }
    .cat-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 20px; cursor: pointer; color: var(--text2); font-size: 13px;
      border: none; background: none; width: 100%; text-align: left;
      transition: all .15s; position: relative;
    }
    .cat-btn::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--accent); opacity: 0; transition: opacity .15s;
    }
    .cat-btn:hover { background: var(--surface); color: var(--text); }
    .cat-btn.active { background: rgba(34,211,160,.08); color: var(--accent); }
    .cat-btn.active::before { opacity: 1; }
    .cat-count { font-family: var(--mono); font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); }

    /* ── MAIN ── */
    .main { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
    .main-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .main-title h1 { font-size: 20px; font-weight: 600; }
    .main-title p { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* ── CALENDAR ── *//* ── CALENDAR ── */
    .cal-trigger {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--text2); font-size: 12px; font-family: var(--mono);
      transition: all .15s; user-select: none; position: relative;
    }
    .cal-trigger:hover { border-color: var(--accent); color: var(--text); }
    .cal-trigger .cal-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
    }

    .cal-popup {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 12px; padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      z-index: 500; min-width: 260px;
      display: none;
    }
    .cal-popup.open { display: block; }

    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-month {
      font-size: 13px; font-weight: 600; color: var(--text);
      font-family: var(--mono);
    }
    .cal-nav {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 14px; padding: 2px 6px;
      border-radius: 4px; transition: color .15s;
    }
    .cal-nav:hover { color: var(--text); }

    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px; margin-bottom: 4px;
    }
    .cal-weekday {
      text-align: center; font-size: 10px; font-family: var(--mono);
      color: var(--text3); padding: 4px 0;
    }
    .cal-weekday:first-child { color: #f7566a; }
    .cal-weekday:last-child  { color: #4f8ef7; }

    .cal-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
    }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      border-radius: 6px; font-size: 12px; color: var(--text3);
      cursor: default; position: relative;
    }
    .cal-day.has-data {
      cursor: pointer; color: var(--text2);
      background: var(--surface2);
    }
    .cal-day.has-data:hover { background: var(--border2); color: var(--text); }
    .cal-day.selected {
      background: var(--accent) !important;
      color: #fff !important; font-weight: 600;
    }
    .cal-day.today { color: var(--accent); font-weight: 600; }
    .cal-day.today.has-data { border: 1px solid var(--accent); }
    .cal-day.empty { visibility: hidden; }
    .cal-day .data-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent); opacity: .8;
    }
    .cal-day.selected .data-dot { background: #fff; }
    .cal-day.future { opacity: .25; cursor: default; }

    .cal-legend {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex; gap: 12px; font-size: 10px; color: var(--text3);
    }
    .cal-legend-item { display: flex; align-items: center; gap: 4px; }
    .cal-legend-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* ── TABLE ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .table-title { font-size: 13px; font-weight: 600; }
    .search-input {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; padding: 6px 12px;
      font-family: var(--sans); font-size: 12px; color: var(--text);
      outline: none; width: 200px;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px; text-align: left;
      font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text3); border-bottom: 1px solid var(--border); background: rgba(255,255,255,.01);
    }
    td { padding: 13px 16px; font-size: 12px; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.04); }
    .rank-num { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text3); width: 36px; text-align: center; }
    .rank-num.top3 { color: var(--yellow); font-size: 18px; }
    .product-cell { display: flex; align-items: center; gap: 10px; }
    .product-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; }
    .product-thumb-ph { width: 56px; height: 56px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .product-info { display: flex; flex-direction: column; gap: 5px; }
    .product-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; max-width: 480px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-link { color: var(--text3); font-size: 10px; text-decoration: none; font-family: var(--mono); transition: color .15s; }
    .product-link:hover { text-decoration: underline; }
    .price-cell { font-family: var(--mono); font-size: 15px; color: var(--hyundai); font-weight: 700; white-space: nowrap; text-align: right; letter-spacing: -0.02em; }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--text3); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-icon { font-size: 36px; opacity: .4; }
    .empty-title { font-size: 14px; font-weight: 500; color: var(--text2); }
    .empty-desc { font-size: 12px; max-width: 300px; line-height: 1.6; }
    .spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 16px; font-size: 12px; color: var(--text); min-width: 220px; animation: slide-in .2s ease; display: flex; align-items: center; gap: 10px; }
    .toast.success { border-color: rgba(34,211,160,.3); }
    .toast.error   { border-color: rgba(247,86,106,.3); }
    .toast.info    { border-color: rgba(34,211,160,.3); }
    @keyframes slide-in { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">U</div>
    <strong>UPM</strong><span>Universal Product Monitor</span>
  </div>
  <nav class="nav-tabs">
    <a href="/" class="nav-tab">GS샵</a>
    <a href="/cj" class="nav-tab">CJ온스타일</a>
    <a href="/hyundai" class="nav-tab active-hyundai">현대홈쇼핑</a>
    <div style="width:1px;background:var(--border2);margin:8px 4px;"></div>
    <a href="/dashboard" class="nav-tab" style="color:var(--text3);">📊 베스트 대시보드</a>
  </nav>
  <div class="topbar-right">
    <button class="btn" id="btn-crawl" onclick="triggerCrawl()">⟳ 수동 갱신</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">카테고리</div>
    <div id="category-list"></div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="main-title">
        <h1 id="page-title">카테고리를 선택하세요</h1>
        <p id="crawled-at">—</p>
      </div>
            <!-- 캘린더 트리거 -->
      <div style="position:relative;">
        <div class="cal-trigger" id="cal-trigger" onclick="toggleCalendar()">
          <span class="cal-dot"></span>
          <span id="cal-selected-label">날짜 선택</span>
          <span style="font-size:10px;opacity:.5;">▼</span>
        </div>
        <div class="cal-popup" id="cal-popup">
          <div class="cal-header">
            <button class="cal-nav" onclick="calNav(-1)">◀</button>
            <span class="cal-month" id="cal-month-label"></span>
            <button class="cal-nav" onclick="calNav(1)">▶</button>
          </div>
          <div class="cal-weekdays">
            <div class="cal-weekday">일</div><div class="cal-weekday">월</div>
            <div class="cal-weekday">화</div><div class="cal-weekday">수</div>
            <div class="cal-weekday">목</div><div class="cal-weekday">금</div>
            <div class="cal-weekday">토</div>
          </div>
          <div class="cal-days" id="cal-days"></div>
          <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot"></div>데이터 있음</div>
            <div class="cal-legend-item" style="color:var(--text3);">■ 선택됨</div>
          </div>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-toolbar">
        <span class="table-title">현대홈쇼핑 베스트랭킹</span>
        <input type="text" class="search-input" placeholder="상품명 검색..." oninput="filterTable(this.value)" />
      </div>
      <div id="table-container">
        <div class="empty-state">
          <div class="empty-icon">🛍️</div>
          <div class="empty-title">카테고리를 선택하세요</div>
          <div class="empty-desc">데이터가 없으면 우상단 '수동 갱신' 버튼을 클릭하세요.</div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script>
const SITE = 'hyundai';
let siteData = null;
let availableDates = [];
let selectedDate = null;
let currentCatIdx = null;
let currentProducts = [];
let filterText = '';

async function init() {
  await loadDates();
  renderDateChips();
  // 최신 날짜 자동 선택
  if (availableDates.length > 0) {
    const latest = availableDates[0];
    const d = new Date(latest);
    const DAYS = ['일','월','화','수','목','금','토'];
    const labelEl = document.getElementById('cal-selected-label');
    if (labelEl) labelEl.textContent = `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
    calViewYear = d.getFullYear();
    calViewMonth = d.getMonth();
    await selectDate(latest);
  } else {
    renderCategoryList();
  }
}

// ── 날짜 관련 ──────────────────────────────────────

async function loadDates() {
  try {
    const res = await fetch(`/api/${SITE}/dates`);
    availableDates = await res.json();
  } catch(e) { availableDates = []; }
}

function renderDateChips() {
  renderCalendar();
}

async function selectDate(dateStr) {
  selectedDate = dateStr;
  renderDateChips();
  await loadData(dateStr);
  renderCategoryList();
  // 이전에 선택된 카테고리 복원
  if (currentCatIdx !== null && siteData && siteData.categories && siteData.categories[currentCatIdx]) {
    selectCategory(currentCatIdx);
  } else {
    currentCatIdx = null;
    currentProducts = [];
    document.getElementById('page-title').textContent = '카테고리를 선택하세요';
    document.getElementById('table-container').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛍️</div>
        <div class="empty-title">카테고리를 선택하세요</div>
      </div>`;
  }
}

// ── 데이터 로드 ──────────────────────────────────────

async function loadData(dateStr) {
  try {
    const url = dateStr ? `/api/${SITE}/data?date=${dateStr}` : `/api/${SITE}/data`;
    const res = await fetch(url);
    siteData = await res.json();
    const timeEl = document.getElementById('crawled-at');
    if (siteData.crawled_at) {
      timeEl.textContent = `수집일시: ${siteData.crawled_at}`;
    } else {
      timeEl.textContent = '데이터 없음 — 수동 갱신 버튼을 클릭하세요';
    }
  } catch(e) {
    showToast('데이터 로드 실패', 'error');
  }
}

function renderCategoryList() {
  const container = document.getElementById('category-list');
  if (!siteData || !siteData.categories || siteData.categories.length === 0) {
    container.innerHTML = `<div style="padding:20px;font-size:12px;color:var(--text3);text-align:center;">데이터 없음<br><small>수동 갱신을 눌러주세요</small></div>`;
    return;
  }
  container.innerHTML = siteData.categories.map((cat, idx) => `
    <button class="cat-btn ${idx === currentCatIdx ? 'active' : ''}" onclick="selectCategory(${idx})">
      <span>${cat.category_name}</span>
      <span class="cat-count">${cat.products ? cat.products.length : 0}</span>
    </button>
  `).join('');
}

function selectCategory(idx) {
  currentCatIdx = idx;
  const cat = siteData.categories[idx];
  currentProducts = cat.products || [];
  filterText = '';
  document.querySelector('.search-input').value = '';
  document.getElementById('page-title').textContent = cat.category_name + ' 베스트랭킹';
  document.querySelectorAll('.cat-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
  renderTable(currentProducts);
}

function filterTable(val) {
  filterText = val;
  renderTable(currentProducts);
}

function renderTable(products) {
  const container = document.getElementById('table-container');
  if (!products || products.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">상품 데이터가 없습니다</div><div class="empty-desc">수동 갱신을 통해 데이터를 수집하세요.</div></div>`;
    return;
  }
  const filtered = filterText
    ? products.filter(p => p.name.toLowerCase().includes(filterText.toLowerCase()))
    : products;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">검색 결과 없음</div></div>`;
    return;
  }

  const rows = filtered.map((p, i) => {
    const rankClass = i < 3 ? 'top3' : '';
    const rankLabel = i < 3 ? ['🥇','🥈','🥉'][i] : (i + 1);
    const thumb = p.img
      ? `<img class="product-thumb" src="${p.img}" onerror="this.parentElement.innerHTML='<div class=product-thumb-ph>🛍️</div>'" />`
      : `<div class="product-thumb-ph">🛍️</div>`;
    return `<tr>
      <td><div class="rank-num ${rankClass}">${rankLabel}</div></td>
      <td><div class="product-cell">${thumb}<div class="product-info">
        <div class="product-name">${p.name}</div>
        ${p.link ? `<a class="product-link" href="${p.link}" target="_blank">↗ 현대홈쇼핑 보기</a>` : ''}
      </div></div></td>
      <td class="price-cell">${p.price || '—'}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `<table>
    <thead><tr><th>순위</th><th>상품</th><th>가격</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── 갱신 ──────────────────────────────────────

async function triggerCrawl() {
  const btn = document.getElementById('btn-crawl');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 수집 중...';
  showToast('현대홈쇼핑 크롤링을 시작합니다...', 'info');
  try {
    await fetch(`/api/${SITE}/crawl`, { method: 'POST' });
    showToast('수집 중... 완료되면 자동으로 반영됩니다.', 'info');
    // 30초마다 완료 여부 체크
    let tries = 0;
    const check = setInterval(async () => {
      tries++;
      await loadDates();
      const today = new Date().toISOString().slice(0, 10);
      if (availableDates.includes(today) || tries >= 12) {
        clearInterval(check);
        btn.disabled = false;
        btn.innerHTML = '⟳ 수동 갱신';
        await selectDate(availableDates[0] || today);
        renderDateChips();
        showToast('갱신 완료!', 'success');
      }
    }, 10000);
  } catch(e) {
    showToast('서버 연결 실패', 'error');
    btn.disabled = false;
    btn.innerHTML = '⟳ 수동 갱신';
  }
}


// ── 캘린더 ──────────────────────────────────────
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth(); // 0-based

function toggleCalendar() {
  const popup = document.getElementById('cal-popup');
  popup.classList.toggle('open');
  if (popup.classList.contains('open')) renderCalendar();
}

// 팝업 외부 클릭 시 닫기
document.addEventListener('click', (e) => {
  const trigger = document.getElementById('cal-trigger');
  const popup = document.getElementById('cal-popup');
  if (trigger && popup && !trigger.contains(e.target) && !popup.contains(e.target)) {
    popup.classList.remove('open');
  }
});

function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCalendar();
}

function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  label.textContent = `${calViewYear}년 ${calViewMonth + 1}월`;

  const container = document.getElementById('cal-days');
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);

  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay(); // 0=일
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();

  let html = '';
  // 앞 빈칸
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day empty"></div>`;
  }
  // 날짜
  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(calViewMonth + 1).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    const dateStr = `${calViewYear}-${mm}-${dd}`;
    const hasData = availableDates.includes(dateStr);
    const isSelected = dateStr === selectedDate;
    const isToday = dateStr === todayStr;
    const isFuture = dateStr > todayStr;

    let cls = 'cal-day';
    if (isFuture) cls += ' future';
    else if (hasData) cls += ' has-data';
    if (isSelected) cls += ' selected';
    if (isToday) cls += ' today';

    const dot = hasData && !isSelected ? '<div class="data-dot"></div>' : '';
    const click = hasData && !isFuture ? `onclick="pickDate('${dateStr}')"` : '';

    html += `<div class="${cls}" ${click}>${d}${dot}</div>`;
  }
  container.innerHTML = html;
}

function pickDate(dateStr) {
  document.getElementById('cal-popup').classList.remove('open');
  const d = new Date(dateStr);
  const DAYS = ['일','월','화','수','목','금','토'];
  document.getElementById('cal-selected-label').textContent =
    `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
  selectDate(dateStr);
}

// ── 토스트 ──────────────────────────────────────

function showToast(msg, type = 'info') {
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

init();
</script>
