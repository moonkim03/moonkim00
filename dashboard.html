<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPM — 홈쇼핑 베스트랭킹</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
      --border: #242830; --border2: #2e3340;
      --accent: #4f8ef7; --green: #22d3a0; --red: #f7566a; --yellow: #f5c842;
      --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6a;
      --mono: 'DM Mono', monospace; --sans: 'Pretendard', sans-serif;
      --gs: #f97316; --cj: #a855f7; --hyundai: #22d3a0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(79,142,247,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,142,247,.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,12,16,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; color: var(--text2); flex-shrink: 0; }
    .logo-mark { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; color: #fff; }
    .logo strong { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-tabs { display: flex; gap: 2px; }
    .nav-tab { padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; text-decoration: none; color: var(--text3); border: 1px solid transparent; transition: all .15s; white-space: nowrap; }
    .nav-tab:hover { color: var(--text2); }
    .nav-tab.active-dashboard { background: rgba(79,142,247,.15); color: #4f8ef7; border-color: rgba(79,142,247,.3); font-weight: 600; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all .15s; font-family: var(--sans); white-space: nowrap; }
    .btn:hover { background: var(--surface2); color: var(--text); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { opacity: .85; }

    /* ── CALENDAR ── */
    .cal-wrap { position: relative; }
    .cal-trigger { display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px; border-radius: 7px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); font-size: 11px; font-family: var(--mono); transition: all .15s; user-select: none; }
    .cal-trigger:hover { border-color: var(--accent); color: var(--text); }
    .cal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .cal-popup { position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.6); z-index: 500; min-width: 256px; display: none; }
    .cal-popup.open { display: block; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cal-month { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--mono); }
    .cal-nav { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; }
    .cal-nav:hover { color: var(--text); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 3px; }
    .cal-weekday { text-align: center; font-size: 10px; font-family: var(--mono); color: var(--text3); padding: 3px 0; }
    .cal-weekday:first-child { color: var(--red); } .cal-weekday:last-child { color: var(--accent); }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border-radius: 5px; font-size: 11px; color: var(--text3); cursor: default; }
    .cal-day.has-data { cursor: pointer; color: var(--text2); background: var(--surface2); }
    .cal-day.has-data:hover { background: var(--border2); color: var(--text); }
    .cal-day.selected { background: var(--accent) !important; color: #fff !important; font-weight: 600; }
    .cal-day.today { color: var(--accent); font-weight: 600; }
    .cal-day.today.has-data { border: 1px solid var(--accent); }
    .cal-day.empty { visibility: hidden; }
    .cal-day.future { opacity: .2; }
    .cal-day .data-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); }
    .cal-day.selected .data-dot { background: rgba(255,255,255,.7); }

    /* ── TV 필터 ── */
    .tv-filter { display: flex; gap: 4px; }
    .tv-btn { padding: 5px 12px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text3); transition: all .15s; font-family: var(--sans); }
    .tv-btn:hover { color: var(--text2); }
    .tv-btn.active { background: rgba(247,86,106,.15); border-color: var(--red); color: var(--red); font-weight: 600; }
    .tv-btn.active-all { background: var(--surface2); border-color: var(--border2); color: var(--text2); font-weight: 600; }

    /* ── CATEGORY TABS ── */
    .cat-nav {
      position: sticky; top: 56px; z-index: 90;
      background: rgba(10,12,16,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex; gap: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-tab { padding: 13px 13px; font-size: 12px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--sans); }
    .cat-tab:hover { color: var(--text2); }
    .cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* ── CONTENT ── */
    .content { position: relative; z-index: 1; padding: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .section-title { font-size: 17px; font-weight: 700; }
    .section-meta { display: flex; align-items: center; gap: 12px; }
    .section-time { font-family: var(--mono); font-size: 11px; color: var(--text3); }
    .tv-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(247,86,106,.12); color: var(--red); border: 1px solid rgba(247,86,106,.2); font-family: var(--mono); }

    /* ── 반응형 채널 그리드 ── */
    .channel-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, 1fr); /* 넓은 화면: 3열 */
    }
    @media (max-width: 1100px) {
      .channel-grid { grid-template-columns: repeat(2, 1fr); } /* 중간: 2열 */
    }
    @media (max-width: 640px) {
      .channel-grid { grid-template-columns: 1fr; } /* 좁은 모바일: 1열 */
    }

    .channel-col { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .channel-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .channel-name { display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: 13px; }
    .channel-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-gs { background: var(--gs); } .dot-cj { background: var(--cj); } .dot-hyundai { background: var(--hyundai); }
    .channel-meta { display: flex; align-items: center; gap: 6px; }
    .channel-count { font-family: var(--mono); font-size: 10px; color: var(--text3); background: var(--surface2); padding: 2px 7px; border-radius: 8px; border: 1px solid var(--border); }
    .tv-excluded-count { font-family: var(--mono); font-size: 10px; color: var(--red); background: rgba(247,86,106,.08); padding: 2px 7px; border-radius: 8px; border: 1px solid rgba(247,86,106,.2); display: none; }
    .tv-excluded-count.show { display: block; }

    .product-list { padding: 4px 0; max-height: 680px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    .product-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      transition: background .12s;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .product-item:last-child { border-bottom: none; }
    .product-item:hover { background: rgba(255,255,255,.03); }

    /* 순위 */
    .rank {
      font-family: var(--mono); font-weight: 700;
      width: 24px; text-align: center; flex-shrink: 0;
      font-size: 12px; color: var(--text3);
    }
    .rank.top { font-size: 18px; line-height: 1; }

    /* 썸네일 */
    .prod-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; }
    .prod-thumb-ph { width: 52px; height: 52px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text3); }

    /* 정보 영역 */
    .prod-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }

    /* 태그 */
    .prod-tags { display: flex; gap: 4px; }
    .tag-tv { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: rgba(247,86,106,.12); color: var(--red); border: 1px solid rgba(247,86,106,.2); font-family: var(--mono); letter-spacing: .03em; }

    /* 상품명 - 1줄로 제한, 깔끔하게 */
    .prod-name {
      font-size: 12.5px; font-weight: 500; color: var(--text);
      line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prod-name a { color: inherit; text-decoration: none; }
    .prod-name a:hover { color: var(--accent); text-decoration: underline; }

    /* 가격 - 크고 굵게 강조 */
    .prod-price {
      font-family: var(--mono);
      font-size: 15px; font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .prod-price.gs-price { color: var(--gs); }
    .prod-price.cj-price { color: var(--cj); }
    .prod-price.hyundai-price { color: var(--hyundai); }

    .empty-col { padding: 36px 16px; text-align: center; color: var(--text3); }
    .empty-icon { font-size: 24px; opacity: .4; margin-bottom: 6px; }
    .empty-text { font-size: 12px; line-height: 1.6; }

    .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; }
    .toast { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text); min-width: 200px; animation: slide-in .2s ease; display: flex; align-items: center; gap: 8px; }
    .toast.success { border-color: rgba(34,211,160,.3); }
    .toast.error { border-color: rgba(247,86,106,.3); }
    .toast.info { border-color: rgba(79,142,247,.3); }
    @keyframes slide-in { from { transform: translateX(14px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <a href="/" style="font-size:12px;color:var(--text2);text-decoration:none;font-weight:500;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);transition:all .15s;" onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--text2)';this.style.borderColor='var(--border2)'">← 홈</a>
  </div>
  <div class="header-right">



    <!-- 캘린더 -->
    <div class="cal-wrap">
      <div class="cal-trigger" id="cal-trigger" onclick="toggleCalendar()">
        <span class="cal-dot"></span>
        <span id="cal-selected-label">날짜 선택</span>
        <span style="font-size:9px;opacity:.5;">▼</span>
      </div>
      <div class="cal-popup" id="cal-popup">
        <div class="cal-header">
          <button class="cal-nav" onclick="calNav(-1)">◀</button>
          <span class="cal-month" id="cal-month-label"></span>
          <button class="cal-nav" onclick="calNav(1)">▶</button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday">일</div><div class="cal-weekday">월</div>
          <div class="cal-weekday">화</div><div class="cal-weekday">수</div>
          <div class="cal-weekday">목</div><div class="cal-weekday">금</div>
          <div class="cal-weekday">토</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-all" onclick="crawlAll()">⟳ 전체 갱신</button>
  </div>
</header>

<!-- CATEGORY TABS -->
<nav class="cat-nav" id="cat-nav"></nav>

<!-- CONTENT -->
<main class="content">
  <div class="section-header">
    <div class="section-title" id="section-title">전체 베스트랭킹</div>
    <div class="section-meta">
      <span class="section-time" id="section-time"></span>
      <div class="tv-filter">
        <button class="tv-btn active-all" id="tv-btn-all" onclick="setTvFilter('all')">전체</button>
        <button class="tv-btn" id="tv-btn-exclude" onclick="setTvFilter('exclude')">📺 TV상품 제외</button>
      </div>
    </div>
  </div>

  <div class="channel-grid">
    <div class="channel-col">
      <div class="channel-header">
        <div class="channel-name"><span class="channel-dot dot-gs"></span> <a href="/gs" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='var(--gs)'" onmouseout="this.style.color='inherit'">GS샵</a></div>
        <div class="channel-meta">
          <span class="tv-excluded-count" id="gs-tv-count"></span>
          <span class="channel-count" id="gs-count">—</span>
        </div>
      </div>
      <div class="product-list" id="gs-list"><div class="empty-col"><div class="empty-icon">📦</div><div class="empty-text">데이터 없음</div></div></div>
    </div>
    <div class="channel-col">
      <div class="channel-header">
        <div class="channel-name"><span class="channel-dot dot-cj"></span> <a href="/cj" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='var(--cj)'" onmouseout="this.style.color='inherit'">CJ온스타일</a></div>
        <div class="channel-meta">
          <span class="tv-excluded-count" id="cj-tv-count"></span>
          <span class="channel-count" id="cj-count">—</span>
        </div>
      </div>
      <div class="product-list" id="cj-list"><div class="empty-col"><div class="empty-icon">📦</div><div class="empty-text">데이터 없음</div></div></div>
    </div>
    <div class="channel-col">
      <div class="channel-header">
        <div class="channel-name"><span class="channel-dot dot-hyundai"></span> <a href="/hyundai" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='var(--hyundai)'" onmouseout="this.style.color='inherit'">현대홈쇼핑</a></div>
        <div class="channel-meta">
          <span class="tv-excluded-count" id="hyundai-tv-count"></span>
          <span class="channel-count" id="hyundai-count">—</span>
        </div>
      </div>
      <div class="product-list" id="hyundai-list"><div class="empty-col"><div class="empty-icon">📦</div><div class="empty-text">데이터 없음</div></div></div>
    </div>
  </div>
</main>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ── 고정 카테고리 (채널별 매핑) ──────────────────────
const FIXED_CATEGORIES = [
  { label: "전체",          gs: "전체",                      cj: "전체",          hy: "전체" },
  { label: "여성의류",      gs: "여성의류",                  cj: "1.여성패션",      hy: "여성의류" },
  { label: "남성의류",      gs: "남성의류",                  cj: "2.남성패션",      hy: "남성의류" },
  { label: "캐주얼의류",    gs: "유니섹스의류",              cj: null,            hy: "캐주얼의류" },
  { label: "패션잡화",      gs: "패션잡화",                  cj: "3.패션잡화",      hy: "명품/잡화" },
  { label: "언더웨어",      gs: "언더웨어",                  cj: "4.언더웨어",      hy: "이지/언더웨어" },
  { label: "뷰티",          gs: "뷰티",                      cj: "5.뷰티",          hy: "뷰티" },
  { label: "신선/가공식품", gs: "신선/가공식품",             cj: ["신선식품","가공식품"],  hy: "신선/가공식품" },
  { label: "건강식품",      gs: "건강식품",                  cj: "8.식품(건강식품)",      hy: "건강식품" },
  { label: "생활/주방",     gs: "생활/주방",                 cj: "9.생활/주방용품", hy: "생활/주방" },
  { label: "가구/침구/홈데코", gs: "가구/침구/홈데코",       cj: "11.가구",          hy: "가구/침구/홈데코" },
  { label: "취미/문화",     gs: "도서/문구/취미",            cj: "12.생활(디자인/취미/여행)",   hy: "취미/문화" },
  { label: "반려동물",      gs: "반려동물용품",              cj: "13.생활(반려동물)",      hy: "반려동물" },
  { label: "스포츠/레저",   gs: "스포츠/레저",               cj: "14.스포츠/레저",   hy: "스포츠/레저" },
  { label: "출산/유아동",   gs: "출산/유아동",               cj: "15.유아동",        hy: "출산/유아동" },
  { label: "가전/디지털",   gs: "가전/디지털",               cj: "16,17.가전",          hy: "가전/디지털" },
  { label: "여행/렌탈",     gs: "여행/e쿠폰/보험/렌탈",     cj: "18.렌탈/여행",     hy: "여행/렌탈" },
];

// TV상품 판별 함수
function isTvProduct(product, channel) {
  if (channel === 'gs') {
    return product.name && product.name.startsWith('[TV상품]');
  }
  if (channel === 'hyundai') {
    return product.is_tv === true;
  }
  if (channel === 'cj') {
    // CJ는 현재 크롤러에서 is_tv 필드 수집 시 사용, 없으면 false
    return product.is_tv === true;
  }
  return false;
}

// GS 상품명에서 [TV상품] 태그 제거한 표시용 이름
function displayName(product, channel) {
  if (channel === 'gs' && product.name && product.name.startsWith('[TV상품]')) {
    return product.name.replace('[TV상품]', '').trim();
  }
  return product.name;
}

// ── 상태 ──────────────────────────────────────────
let gsData = { crawled_at: null, categories: [] };
let cjData = { crawled_at: null, categories: [] };
let hyundaiData = { crawled_at: null, categories: [] };
let currentCatIdx = 0;
let selectedDate = null;
let availableDates = [];
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth();
let tvFilter = 'all'; // 'all' | 'exclude'

// ── 초기화 ──────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadAvailableDates();
  renderCalendar();
  if (availableDates.length > 0) {
    selectedDate = availableDates[0];
    updateCalLabel(selectedDate);
    calViewYear = new Date(selectedDate).getFullYear();
    calViewMonth = new Date(selectedDate).getMonth();
  }
  renderCategoryTabs();
  await loadAllData(selectedDate);
  renderAll();
});

// ── 날짜 ──────────────────────────────────────────
async function loadAvailableDates() {
  const sets = await Promise.all([
    fetch('/api/gsshop/dates').then(r=>r.json()).catch(()=>[]),
    fetch('/api/cj/dates').then(r=>r.json()).catch(()=>[]),
    fetch('/api/hyundai/dates').then(r=>r.json()).catch(()=>[]),
  ]);
  availableDates = Array.from(new Set(sets.flat())).sort().reverse();
}

function updateCalLabel(dateStr) {
  if (!dateStr) return;
  const d = new Date(dateStr);
  const DAYS = ['일','월','화','수','목','금','토'];
  document.getElementById('cal-selected-label').textContent =
    `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
}

function toggleCalendar() {
  const p = document.getElementById('cal-popup');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderCalendar();
}
document.addEventListener('click', e => {
  const t = document.getElementById('cal-trigger');
  const p = document.getElementById('cal-popup');
  if (t && p && !t.contains(e.target) && !p.contains(e.target)) p.classList.remove('open');
});
function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCalendar();
}
function renderCalendar() {
  const lbl = document.getElementById('cal-month-label');
  if (!lbl) return;
  lbl.textContent = `${calViewYear}년 ${calViewMonth+1}월`;
  const c = document.getElementById('cal-days');
  const todayStr = new Date().toISOString().slice(0,10);
  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  const days = new Date(calViewYear, calViewMonth+1, 0).getDate();
  let h = '';
  for (let i=0; i<firstDay; i++) h += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=days; d++) {
    const ds = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = availableDates.includes(ds);
    const sel = ds === selectedDate;
    const tod = ds === todayStr;
    const fut = ds > todayStr;
    let cls = 'cal-day' + (fut?' future':has?' has-data':'') + (sel?' selected':'') + (tod&&!fut?' today':'');
    const dot = has && !sel ? '<div class="data-dot"></div>' : '';
    const clk = has && !fut ? `onclick="pickDate('${ds}')"` : '';
    h += `<div class="${cls}" ${clk}>${d}${dot}</div>`;
  }
  c.innerHTML = h;
}
async function pickDate(ds) {
  document.getElementById('cal-popup').classList.remove('open');
  selectedDate = ds;
  updateCalLabel(ds);
  renderCalendar();
  await loadAllData(ds);
  renderAll();
}

// ── TV 필터 ──────────────────────────────────────────
function setTvFilter(mode) {
  tvFilter = mode;
  document.getElementById('tv-btn-all').className = 'tv-btn' + (mode==='all'?' active-all':'');
  document.getElementById('tv-btn-exclude').className = 'tv-btn' + (mode==='exclude'?' active':'');
  document.getElementById('tv-filter-badge').style.display = mode==='exclude' ? 'block' : 'none';
  renderAll();
}

// ── 데이터 로드 ──────────────────────────────────────
async function loadAllData(dateStr) {
  const q = dateStr ? `?date=${dateStr}` : '';
  try { gsData = await fetch('/api/gsshop/data'+q).then(r=>r.json()); } catch(e) {}
  try { cjData = await fetch('/api/cj/data'+q).then(r=>r.json()); } catch(e) {}
  try { hyundaiData = await fetch('/api/hyundai/data'+q).then(r=>r.json()); } catch(e) {}
}

// ── 카테고리 탭 ──────────────────────────────────────
function renderCategoryTabs() {
  document.getElementById('cat-nav').innerHTML = FIXED_CATEGORIES.map((c,i) =>
    `<button class="cat-tab ${i===currentCatIdx?'active':''}" onclick="selectCat(${i})">${c.label}</button>`
  ).join('');
}
function selectCat(idx) {
  currentCatIdx = idx;
  document.querySelectorAll('.cat-tab').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.getElementById('section-title').textContent = FIXED_CATEGORIES[idx].label + ' 베스트랭킹';
  renderAll();
}

// ── 렌더링 ──────────────────────────────────────────
function getProducts(data, catKey) {
  if (!data.categories || !data.categories.length) return [];
  if (catKey === '전체') {
    const allCat = data.categories.find(c => c.category_name === '전체');
    if (allCat) return allCat.products || [];
    return data.categories.flatMap(c => (c.products||[]).slice(0,3));
  }
  // 배열이면 교차 정렬 (신선식품1, 가공식품1, 신선식품2, ...)
  if (Array.isArray(catKey)) {
    const lists = catKey.map(key => {
      const cat = data.categories.find(c => c.category_name === key);
      return cat ? (cat.products || []) : [];
    });
    const maxLen = Math.max(...lists.map(l => l.length));
    const merged = [];
    for (let i = 0; i < maxLen; i++) {
      lists.forEach(list => { if (list[i]) merged.push(list[i]); });
    }
    return merged;
  }
  const cat = data.categories.find(c => c.category_name === catKey);
  return cat ? (cat.products||[]) : [];
}

function renderAll() {
  const cat = FIXED_CATEGORIES[currentCatIdx];
  const times = [gsData, cjData, hyundaiData].map(d=>d.crawled_at).filter(Boolean);
  document.getElementById('section-time').textContent = times.length ? `수집: ${times[0]}` : '';
  renderChannel('gs',      gsData,      cat.gs, 'gs-price',      'gs');
  renderChannel('cj',      cjData,      cat.cj, 'cj-price',      'cj');
  renderChannel('hyundai', hyundaiData, cat.hy, 'hyundai-price', 'hyundai');
}

function renderChannel(id, data, catKey, priceClass, channel) {
  const list = document.getElementById(`${id}-list`);
  const countEl = document.getElementById(`${id}-count`);
  const tvCountEl = document.getElementById(`${id}-tv-count`);

  if (!catKey) {
    countEl.textContent = '—';
    list.innerHTML = `<div class="empty-col"><div class="empty-icon">➖</div><div class="empty-text">해당 카테고리 없음</div></div>`;
    return;
  }

  let products = getProducts(data, catKey);
  if (!products.length) {
    countEl.textContent = '0개';
    tvCountEl.classList.remove('show');
    list.innerHTML = `<div class="empty-col"><div class="empty-icon">📦</div><div class="empty-text">데이터 없음</div></div>`;
    return;
  }

  // TV 상품 구분
  const tvProducts = products.filter(p => isTvProduct(p, channel));
  const nonTvProducts = products.filter(p => !isTvProduct(p, channel));
  const displayProducts = tvFilter === 'exclude' ? nonTvProducts : products;

  // TV 카운트 배지
  if (tvFilter === 'exclude' && tvProducts.length > 0) {
    tvCountEl.textContent = `TV ${tvProducts.length}개 제외`;
    tvCountEl.classList.add('show');
  } else {
    tvCountEl.classList.remove('show');
  }

  countEl.textContent = displayProducts.length + '개';

  if (!displayProducts.length) {
    list.innerHTML = `<div class="empty-col"><div class="empty-icon">📺</div><div class="empty-text">TV상품 제외 시 표시할 상품이 없습니다</div></div>`;
    return;
  }

  list.innerHTML = displayProducts.map((p, i) => {
    const isTV = isTvProduct(p, channel);
    const rankLabel = i < 3 ? ['🥇','🥈','🥉'][i] : (i+1);
    const rankCls = i < 3 ? 'top' : '';
    const thumb = p.img
      ? `<img class="prod-thumb" src="${p.img}" onerror="this.outerHTML='<div class=prod-thumb-ph>📦</div>'" />`
      : `<div class="prod-thumb-ph">📦</div>`;
    const name = displayName(p, channel);
    const nameHtml = p.link ? `<a href="${p.link}" target="_blank">${name}</a>` : name;
    const tvTag = isTV ? `<span class="tag-tv">📺 TV</span>` : '';
    const priceHtml = p.price ? `<div class="prod-price ${priceClass}">${p.price}</div>` : `<div class="prod-price" style="color:var(--text3);font-size:11px;">가격 없음</div>`;
    return `<div class="product-item">
      <div class="rank ${rankCls}">${rankLabel}</div>
      ${thumb}
      <div class="prod-info">
        <div class="prod-name">${tvTag ? `${tvTag} ` : ''}${nameHtml}</div>
        ${priceHtml}
      </div>
    </div>`;
  }).join('');
}

// ── 전체 갱신 ──────────────────────────────────────
async function crawlAll() {
  const btn = document.getElementById('btn-all');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 수집 중...';
  showToast('전체 갱신 시작 (GS+CJ+현대)... 수분 소요됩니다', 'info');
  try {
    await Promise.all([
      fetch('/api/gsshop/crawl', {method:'POST'}),
      fetch('/api/cj/crawl', {method:'POST'}),
      fetch('/api/hyundai/crawl', {method:'POST'}),
    ]);
    let tries = 0;
    const check = setInterval(async () => {
      tries++;
      const s = await fetch('/api/status').then(r=>r.json()).catch(()=>({}));
      if (!s.gsshop_crawling || tries >= 30) {
        clearInterval(check);
        await loadAvailableDates();
        const today = new Date().toISOString().slice(0,10);
        selectedDate = availableDates.includes(today) ? today : (availableDates[0]||null);
        if (selectedDate) { updateCalLabel(selectedDate); renderCalendar(); }
        await loadAllData(selectedDate);
        renderAll();
        btn.disabled = false;
        btn.innerHTML = '⟳ 전체 갱신';
        showToast('전체 갱신 완료!', 'success');
      }
    }, 15000);
  } catch(e) {
    showToast('갱신 실패', 'error');
    btn.disabled = false;
    btn.innerHTML = '⟳ 전체 갱신';
  }
}

// ── 토스트 ──────────────────────────────────────────
function showToast(msg, type='info') {
  const icons = {'success':'✓','error':'✕','info':'ℹ'};
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}
</script>
